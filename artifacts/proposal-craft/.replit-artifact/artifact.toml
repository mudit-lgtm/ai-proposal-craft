kind = "web"
previewPath = "/"
title = "AI Proposal Craft"
version = "1.0.0"
id = "artifacts/proposal-craft"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20845

[services.development]
run = "pnpm --filter @workspace/proposal-craft run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/proposal-craft", "run", "build" ]
publicDir = "artifacts/proposal-craft/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20845"
BASE_PATH = "/"
